<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懂的都懂资源</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #fafafa;
            color: #333;
            padding: 2rem 5%;
        }
        /* 页面标题 */
        .page-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 3rem;
            color: #2d3748;
            letter-spacing: 1px;
        }
        /* 合集容器 */
        .collection-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }
        /* 单个合集板块 */
        .collection {
            background-color: #fff;
            padding: 1.8rem;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .collection h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            color: #2d3748;
            font-weight: 600;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        /* 子链接列表 */
        .link-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            list-style: none;
        }
        .link-list li a {
            text-decoration: none;
            color: #4299e1;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .link-list li a:hover {
            background-color: #4299e1;
            color: #fff;
        }
        /* 移动端适配 */
        @media (max-width: 600px) {
            .page-title {
                font-size: 1.5rem;
                margin-bottom: 2rem;
            }
            .collection {
                padding: 1.5rem;
            }
            .link-list {
                flex-direction: column;
                gap: 0.8rem;
            }
            .link-list li a {
                display: block;
                width: 100%;
                text-align: center;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <h1 class="page-title">懂的都懂资源</h1>

    <!-- 合集容器 -->
    <div class="collection-container">
        <!-- 合集一 -->
        <section class="collection">
            <h2>合集一</h2>
            <ul class="link-list">
                <li><a href="https://pan.quark.cn/s/74e4a6f61ed3">好看视频</a ></li>
            </ul>
        </section>

        <!-- 合集二 -->
        <section class="collection">
            <h2>合集 2</h2>
            <ul class="link-list">
                <li><a href="https://pan.quark.cn/s/74e4a6f61ed3">好看视频</a ></li>
            </ul>
        </section>

        <!-- 合集三 -->
        <section class="collection">
            <h2>合集 3</h2>
            <ul class="link-list">
                <li><a href="#">子链接3-1</a ></li>
            </ul>
        </section>
    </div>
</body>
</html>
